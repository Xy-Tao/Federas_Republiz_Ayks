<div class="container">

<script>


function loadPage(page){


fetch("aia/" + page)

.then(response => {


if(!response.ok){

throw new Error("Ошибка загрузки");

}


return response.text();


})


.then(data => {


document.getElementById("aia-content").innerHTML = data;



// изменение названия вкладки браузера


let titles = {


"main.html":
"А.И.Я | Об агентстве",


"departments.html":
"А.И.Я | Отделы",


"access_levels.html":
"А.И.Я | Уровни доступа",


"containment_levels.html":
"А.И.Я | Уровни сдерживания",


"protocols.html":
"А.И.Я | Протоколы",


"anomaly_classes.html":
"А.И.Я | Классификация аномалий",


"races.html":
"А.И.Я | Расы"


};



document.title = titles[page] || "А.И.Я | Федерация Республик Аякса";



})


.catch(error => {


document.getElementById("aia-content").innerHTML =

"<h2>Ошибка загрузки данных</h2>";


});


}





// загрузка главной страницы автоматически

loadPage("main.html");



</script>
