<h2>

</h2>



<div class="spinner">

</div>




<div class="system-data">


NODE: FR-A-001<br>

DATABASE: ONLINE<br>

SECURITY LEVEL: PUBLIC<br>

ARCHIVE STATUS: CONNECTED


</div>



<div id="logs">

</div>



<div class="progress-box">

<div id="progress"></div>

</div>



<p id="status">

Инициализация системы...

</p>



</div>





<script>


const logs = [

"Запуск центрального ядра........ OK",

"Проверка систем безопасности..... OK",

"Подключение архивных узлов....... OK",

"Загрузка базы данных............. OK",

"Проверка целостности файлов...... OK",

"Синхронизация мировых архивов.... OK",

"Активация А.И.Я.................. OK",

"Проверка протоколов доступа...... OK",

"Центральная система готова........ OK"

];



let current = 0;

let progress = 0;



const logBox = document.getElementById("logs");

const bar = document.getElementById("progress");

const status = document.getElementById("status");





let loader = setInterval(()=>{


if(current < logs.length){


let line=document.createElement("p");

line.textContent="> "+logs[current];


logBox.appendChild(line);

logBox.scrollTop = logBox.scrollHeight;


current++;

}



progress += Math.floor(Math.random()*10)+5;



if(progress>=100){


progress=100;


clearInterval(loader);


status.textContent="ACCESS GRANTED // WELCOME TO FEDERATION ARCHIVE";


setTimeout(()=>{


window.location.href="archive.html";


},2000);


}



bar.style.width=progress+"%";


status.textContent=
"Загрузка данных: "+progress+"%";



},2000);



</script>
